{% extends "base.html" %}
{% block title %}Create Account – ShopWave{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon"
                style="font-size:2.5rem; display:block; text-align:center; margin-bottom:8px; filter:drop-shadow(0 0 12px var(--primary));">
                ⚡</div>
            <div class="logo-text">ShopWave</div>
        </div>

        <div class="form-card fade-up">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Join thousands of happy shoppers</p>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required
                        value="{{ request.form.get('name', '') }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required
                        value="{{ request.form.get('email', '') }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min. 6 characters"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
                    Create Account →
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
